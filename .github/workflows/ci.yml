name: ci

on:
  push:
  pull_request:

env:
  # Run all JS-based actions on Node 24 ahead of GitHub's 2026-06-02 default
  # switch (silences the "Node.js 20 actions are deprecated" annotation while
  # actions/checkout, setup-node, pnpm/action-setup are still on @v4).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
